<svg viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0b16"/>
      <stop offset="100%" stop-color="#1a1442"/>
    </linearGradient>
    <linearGradient id="bracket" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5865F2"/>
      <stop offset="100%" stop-color="#9B59B6"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="46%" r="55%">
      <stop offset="0%" stop-color="#5865F2" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#5865F2" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="512" height="512" fill="url(#bg)"/>
  <circle cx="256" cy="240" r="230" fill="url(#glow)"/>

  <!-- Left bracket < -->
  <path d="M 200 140 L 108 256 L 200 372"
        fill="none" stroke="url(#bracket)" stroke-width="34"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Right bracket > -->
  <path d="M 312 140 L 404 256 L 312 372"
        fill="none" stroke="url(#bracket)" stroke-width="34"
        stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Checkmark fused between the brackets -->
  <path d="M 224 262 L 248 290 L 294 222"
        fill="none" stroke="#F1C40F" stroke-width="30"
        stroke-linecap="round" stroke-linejoin="round"/>
</svg>
