version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: devos
      POSTGRES_PASSWORD: devos_password
      POSTGRES_DB: devos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devos -d devos"]
      interval: 10s
      timeout: 5s
      retries: 5

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://devos:devos_password@postgres:5432/devos
    # migrate (create tables) -> seed (badge rows the auto-award system needs;
    # upsert, so it's safe to re-run every start) -> start the bot.
    command: >
      sh -c "npx prisma migrate deploy && node dist/seed.js && node dist/index.js"

volumes:
  postgres_data:
